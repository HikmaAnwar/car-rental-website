type Car {
  id: ID!
  name: String!
  brand: String!
  pricePerDay: Float!
  available: Boolean!
  imageUrl: String
}

type Booking {
  id: ID!
  car: Car!
  startDate: String!
  endDate: String!
  status: String!
  userEmail: String!
}

type Query {
  cars: [Car!]!
  car(id: ID!): Car
  bookings: [Booking!]!
}

type Mutation {
  createCar(name: String!, brand: String!, pricePerDay: Float!, imageUrl: String): Car!
  updateCar(id: ID!, name: String, brand: String, pricePerDay: Float, available: Boolean, imageUrl: String): Car!
  deleteCar(id: ID!): Boolean!
  createBooking(carId: ID!, startDate: String!, endDate: String!, userEmail: String!): Booking!
}
