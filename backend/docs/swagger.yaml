basePath: /
definitions:
  controllers.CreateBookingRequest:
    properties:
      carId:
        type: string
      endDate:
        type: string
      startDate:
        type: string
      userEmail:
        type: string
    required:
    - carId
    - endDate
    - startDate
    - userEmail
    type: object
  models.Booking:
    properties:
      car:
        $ref: '#/definitions/models.Car'
      car_id:
        type: integer
      created_at:
        type: string
      end_date:
        type: string
      id:
        type: integer
      start_date:
        type: string
      status:
        description: pending, confirmed, cancelled
        type: string
      updated_at:
        type: string
      user_email:
        type: string
    type: object
  models.Car:
    properties:
      available:
        type: boolean
      brand:
        type: string
      created_at:
        type: string
      id:
        type: integer
      image_url:
        type: string
      name:
        type: string
      price_per_day:
        type: number
      updated_at:
        type: string
    type: object
  models.Login2FARequest:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      remember_me:
        type: boolean
    required:
    - email
    - password
    type: object
  models.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      two_fa:
        description: Is 2FA turned on for this user?
        type: boolean
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.Verify2FARequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
host: localhost:8088
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server for a web app.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Web App API
  version: "1.0"
paths:
  /api/2fa/disable:
    post:
      description: Turn off 2FA for the current user
      responses:
        "200":
          description: 2FA disabled successfully
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Disable 2FA
      tags:
      - auth
  /api/2fa/setup:
    post:
      description: Generate a 2FA secret and QR code URI
      produces:
      - application/json
      responses:
        "200":
          description: Secret and QR URI
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Setup 2FA
      tags:
      - auth
  /api/2fa/verify:
    post:
      consumes:
      - application/json
      description: Confirm 2FA setup with a 6-digit code
      parameters:
      - description: 2FA Code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.Verify2FARequest'
      responses:
        "200":
          description: 2FA enabled successfully
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Verify and Enable 2FA
      tags:
      - auth
  /api/bookings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Booking'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all bookings
      tags:
      - Rental Fleet
    post:
      consumes:
      - application/json
      parameters:
      - description: Booking details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new booking
      tags:
      - Rental Fleet
  /api/cars:
    get:
      description: Get a list of cars with optional filtering by brand, name, or search
        term
      parameters:
      - description: Filter by brand
        in: query
        name: brand
        type: string
      - description: Filter by name
        in: query
        name: name
        type: string
      - description: Search in name and brand
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Car'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List and search cars
      tags:
      - Rental Fleet
  /api/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return a message
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            type: string
      summary: Login user
      tags:
      - auth
  /api/login/2fa:
    post:
      consumes:
      - application/json
      description: Complete login process with 2FA code
      parameters:
      - description: Email and 2FA Code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.Login2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login tokens
          schema:
            type: string
      summary: Login with 2FA
      tags:
      - auth
  /api/logout:
    post:
      description: Invalidate the user's refresh token
      responses:
        "200":
          description: Logged out successfully
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /api/profile:
    get:
      consumes:
      - application/json
      description: Get the profile of the currently logged-in user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - auth
  /api/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a valid refresh token
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New access token
          schema:
            type: string
      summary: Refresh access token
      tags:
      - auth
  /api/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            type: string
      summary: Register a new user
      tags:
      - auth
  /api/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload an image file for a car and get a persistent URL
      parameters:
      - description: Image file to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload a vehicle image
      tags:
      - Rental Fleet
  /health:
    get:
      description: Check if the server is up and running
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health Check
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: Type "Bearer <your_token>"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
